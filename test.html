<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTURECRIME SUMMIT 2026 - Interactive Letter Theme</title>
    
    <!-- 1. ADD THESE FONTS TO YOUR <HEAD> -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/aquire" rel="stylesheet">
    
    <!-- 2. ADD THIS CSS TO YOUR STYLESHEET -->
    <style>
        /* ==========================================
           1. ISOLATED LIGHT THEME RESET
           ========================================== */
        .isolated-antigravity-module {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff; 
            color: #000000; 
            position: relative;
            width: 100%;
            /* Substantial vertical padding to give the watermark breathing room */
            padding: clamp(8rem, 20vh, 15rem) 0; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .isolated-antigravity-module *,
        .isolated-antigravity-module *::before,
        .isolated-antigravity-module *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ==========================================
           2. RESPONSIVE LIGHT THEME WATERMARK
           ========================================== */
        .isolated-antigravity-module .bg-watermark {
            position: relative; 
            font-family: 'Aquire', sans-serif;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* FIXED OVERLAP: Increased gap and line-height */
            gap: clamp(2rem, 5vw, 4rem); 
            line-height: 1.4; 

            width: 100%;
            text-align: center;
            padding: 0 2rem;
            
            white-space: nowrap;
            z-index: 1;
            user-select: none;
            text-transform: uppercase;
            pointer-events: none; 

            /* BOLDER SETTINGS */
            font-weight: 900;
            -webkit-text-stroke: 1.5px rgba(0,0,0,0.03);
        }

        /* Line Wrappers */
        .isolated-antigravity-module .watermark-line {
            display: flex;
            justify-content: center;
            pointer-events: auto; 
            width: 100%;
        }

        /* PER-LETTER STYLING */
        .isolated-antigravity-module .char {
            display: inline-block;
            opacity: 0.18; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: default;
            pointer-events: auto;
        }

        /* First line sizing - FUTURECRIME */
        .isolated-antigravity-module .line-1 .char {
            font-size: clamp(2rem, 8.2vw, 15rem); 
            letter-spacing: 0.04em;
        }

        /* Second line sizing - SUMMIT 2026 */
        .isolated-antigravity-module .line-2 .char {
            font-size: clamp(1.2rem, 5.2vw, 9rem); 
            letter-spacing: 0.25em; 
        }

        /* SINGLE LETTER HOVER EFFECT */
        .isolated-antigravity-module .char:hover {
            opacity: 1;
            transform: scale(1.12) translateY(-8px); 
            background: linear-gradient(93deg, #5135FF 10.65%, #FF5455 89.35%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 12px 25px rgba(81, 53, 255, 0.3));
            z-index: 10;
            -webkit-text-stroke: 0;
        }

        /* Mobile specific adjustments to ensure clean separation */
        @media (max-width: 640px) {
            .isolated-antigravity-module {
                padding: 6rem 0;
            }
            .isolated-antigravity-module .bg-watermark {
                padding: 0 1rem;
                gap: 1.5rem; /* Explicit mobile gap */
            }
            .isolated-antigravity-module .line-2 .char {
                letter-spacing: 0.15em; 
            }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff;">

    <div class="isolated-antigravity-module">
        
        <!-- The Watermark Container -->
        <div class="bg-watermark">
            <div class="watermark-line line-1" id="text-1">FUTURECRIME</div>
            <div class="watermark-line line-2" id="text-2">SUMMIT 2026</div>
        </div>

    </div>

    <!-- 3. SCRIPT TO SPLIT TEXT INTO INTERACTIVE LETTERS -->
    <script>
        function splitTextIntoSpans(elementId) {
            const element = document.getElementById(elementId);
            if (!element) return;
            
            const text = element.innerText;
            element.innerHTML = ''; // Clear original
            
            [...text].forEach(char => {
                const span = document.createElement('span');
                span.className = 'char';
                // Handle spaces so they don't collapse
                span.innerHTML = char === ' ' ? '&nbsp;' : char;
                element.appendChild(span);
            });
        }

        // Initialize splitting on window load
        window.onload = function() {
            splitTextIntoSpans('text-1');
            splitTextIntoSpans('text-2');
        };
    </script>
</body>
</html>
